name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version tag to create, for example v0.1.2.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build:
    name: Dry-run and build release archives
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if ! printf '%s\n' "${RELEASE_VERSION}" \
            | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            printf 'Release version must look like vX.Y.Z, got %s\n' "${RELEASE_VERSION}" >&2
            exit 1
          fi

      - name: Dry-run Bach release
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        run: |
          go run ./cmd/bach \
            --var "release_version=${RELEASE_VERSION}" \
            --var "github_repo=${GITHUB_REPOSITORY_NAME}" \
            run --dry-run shell/github-release

      - name: Build release archives
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        run: |
          go run ./cmd/bach \
            --var "release_version=${RELEASE_VERSION}" \
            --var "github_repo=${GITHUB_REPOSITORY_NAME}" \
            run shell/build-release

      - name: Smoke-test release Bachkator runner
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/release-bach"
          tar -xzf dist/bachkator_linux_amd64.tar.gz -C "${RUNNER_TEMP}/release-bach" bach
          "${RUNNER_TEMP}/release-bach/bach" --version
          "${RUNNER_TEMP}/release-bach/bach" \
            --var "release_version=${RELEASE_VERSION}" \
            --var "github_repo=${GITHUB_REPOSITORY_NAME}" \
            run --dry-run shell/github-release-publish

      - name: Upload release archives
        uses: actions/upload-artifact@v4
        with:
          name: release-archives
          path: dist/bachkator_*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          name: release-archives
          path: dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Dry-run publish
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        run: |
          go run ./cmd/bach \
            --var "release_version=${RELEASE_VERSION}" \
            --var "github_repo=${GITHUB_REPOSITORY_NAME}" \
            run --dry-run shell/github-release-publish

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        run: |
          go run ./cmd/bach \
            --var "release_version=${RELEASE_VERSION}" \
            --var "github_repo=${GITHUB_REPOSITORY_NAME}" \
            run shell/github-release-publish
