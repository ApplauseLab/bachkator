name: Download Bachkator
description: Download a Bachkator release archive and add bach to PATH.

inputs:
  version:
    description: Release version to download, or latest for the latest release.
    required: false
    default: latest
  repository:
    description: Repository that publishes Bachkator release archives.
    required: false
    default: ApplauseLab/bachkator
  install-dir:
    description: Directory where the bach binary should be installed.
    required: false
    default: ${{ runner.temp }}/bach/bin
  github-token:
    description: GitHub token used by gh release download.
    required: false
    default: ${{ github.token }}

outputs:
  path:
    description: Full path to the installed bach binary.
    value: ${{ steps.install.outputs.path }}

runs:
  using: composite
  steps:
    - id: install
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        BACH_REPOSITORY: ${{ inputs.repository }}
        BACH_VERSION: ${{ inputs.version }}
        INSTALL_DIR: ${{ inputs.install-dir }}
        RUNNER_OS_NAME: ${{ runner.os }}
        RUNNER_ARCH_NAME: ${{ runner.arch }}
      run: |
        set -euo pipefail

        case "${RUNNER_OS_NAME}" in
          Linux) goos="linux" ;;
          macOS) goos="darwin" ;;
          *)
            printf 'Unsupported runner OS: %s\n' "${RUNNER_OS_NAME}" >&2
            exit 1
            ;;
        esac

        case "${RUNNER_ARCH_NAME}" in
          X64) goarch="amd64" ;;
          ARM64) goarch="arm64" ;;
          *)
            printf 'Unsupported runner architecture: %s\n' "${RUNNER_ARCH_NAME}" >&2
            exit 1
            ;;
        esac

        archive="bachkator_${goos}_${goarch}.tar.gz"
        scratch="$(mktemp -d)"

        if ! printf '%s\n' "${BACH_REPOSITORY}" | grep -Eq '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$'; then
          printf 'Invalid repository: %s\n' "${BACH_REPOSITORY}" >&2
          exit 1
        fi
        if [ "${BACH_VERSION}" != "latest" ] \
          && ! printf '%s\n' "${BACH_VERSION}" \
            | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
          printf 'Invalid Bachkator version: %s\n' "${BACH_VERSION}" >&2
          exit 1
        fi
        case "${INSTALL_DIR}" in
          -*)
            printf 'install-dir must not start with -\n' >&2
            exit 1
            ;;
          *$'\n'*|*$'\r'*)
            printf 'install-dir must not contain control characters\n' >&2
            exit 1
            ;;
        esac

        mkdir -p "${INSTALL_DIR}"

        if [ "${BACH_VERSION}" = "latest" ]; then
          gh release download --repo "${BACH_REPOSITORY}" --pattern "${archive}" --dir "${scratch}"
        else
          gh release download "${BACH_VERSION}" --repo "${BACH_REPOSITORY}" --pattern "${archive}" --dir "${scratch}"
        fi

        tar -xzf "${scratch}/${archive}" -C "${INSTALL_DIR}" bach
        chmod +x "${INSTALL_DIR}/bach"
        printf '%s\n' "${INSTALL_DIR}" >> "${GITHUB_PATH}"
        printf 'path=%s/bach\n' "${INSTALL_DIR}" >> "${GITHUB_OUTPUT}"
