version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - dupl
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
    dupl:
      threshold: 200

formatters:
  enable:
    - gofmt
    - golines
  settings:
    golines:
      max-len: 100
